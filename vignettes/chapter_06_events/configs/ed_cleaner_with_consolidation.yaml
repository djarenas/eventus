# ed_cleaner_with_consolidation.yaml
# EventsCleanerConfig for ED visit data.
# Used in Chapters 6 and 7.

normalize_dates:     true
parse_dates:         true
drop_duplicate_rows: true
date_floor:          "1920-01-01"
date_ceiling:        "2030-01-01"

consolidate:
  descriptor_cols:
    icd10_condition: unique
    systolic_bp:     median
