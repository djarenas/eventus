# cooccurrence_violin_config.yaml
# ArraysViolinConfig for Chapter 8 gap distributions

canvas:
  figsize:   [10, 8]
  dpi:       120
  font_size: 12

labels:
  title:  "Days Between ED Visits and Hospitalizations — 2022 Cohort"
  ylabel: "days"

axes:
  y_min: 0

style:
  bandwidth:   scott
  show_box:    true
  show_points: false

percentiles:
  show:        true
  values:      [25, 50, 75]
  linestyle:   dashed
  show_labels: true

categories:
  "ED → next\nhospitalization":
    color: "#028090"
    label: "ED → next hospitalization"
  "Discharge → next\nED visit":
    color: "#E05C40"
    label: "Discharge → next ED visit"
