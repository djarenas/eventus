# stacked_timeline_ch08_config.yaml
# Chapter 8 — hospitalizations (events) + ED visits (occurrences)

canvas:
  figsize:   [16, 10]
  dpi:       150
  font_size: 12

labels:
  title:           "ED Visits and Hospitalizations — 2022 Cohort (n=50 sample)"
  title_font_size: 18

layout:
  row_height:         0.5
  bar_height_ratio:   0.85
  style:              "seaborn-v0_8-whitegrid"
  show_entity_labels: false

x_axis:
  mode:     calendar
  unit:     months
  interval: 1
  format:   "%Y-%m"

poi:
  color_before:    "#FAFAF9"
  color_middle:    "#F6C3A4"
  color_after:     "#FAFAF9"
  color_no_events: "#FAF9F9"
  alpha:           1.0
  show_boundaries: true
  boundary_color:  "#6B7C93"
  boundary_style:  dashed

events:
  - identity: inpatient_hospitalization
    color:    "#E05C40"
    alpha:    0.85
    label:    "Hospitalization"

occurrences:
  - identity: ed_visit
    color:    "#028090"
    marker:   circle
    size:     6
    alpha:    0.9
    label:    "ED Visit"

legend:
  show:               true
  location:           "upper right"
  font_size:          10
  outside:            true
  show_poi_in_legend: false
