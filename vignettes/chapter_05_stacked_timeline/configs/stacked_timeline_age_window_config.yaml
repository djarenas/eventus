# stacked_timeline_age_window_config.yaml
# StackedTimelineConfig for Chapter 5 — Age Window Coverage Timeline
# Observation periods differ per member (age 18-25).

canvas:
  figsize:   [16, 8]
  dpi:       150
  font_size: 14

labels:
  title:           "Medicaid Coverage Ages 18-25 (n=50 sample)"
  title_font_size: 20

layout:
  row_height:         0.5
  bar_height_ratio:   0.95
  style:              "seaborn-v0_8-whitegrid"
  show_entity_labels: false
  max_entities:       100

x_axis:
  mode:     auto
  unit:     months
  interval: 3
  format:   "%Y-%m"

poi:
  color_before:    "#FAFAF9"
  color_middle:    "#F6C3A4"
  color_after:     "#FAFAF9"
  color_no_episodes: "#FAF9F9"
  alpha:           1.0
  show_boundaries: true
  boundary_color:  "#6B7C93"
  boundary_style:  dashed

episodes:
  - identity: medicaid_coverage
    color:    "#9FC0F6"
    alpha:    0.85
    label:    "Medicaid Coverage"

legend:
  show:               true
  location:           "upper right"
  font_size:          9
  outside:            true
  show_poi_in_legend: false