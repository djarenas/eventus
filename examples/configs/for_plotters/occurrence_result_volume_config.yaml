# occurrence_result_volume_config.yaml
#
# Full configuration for OccurrenceResultVolumePlotter.
# Load with: OccurrenceResultVolumeConfig.build_from_yaml("occurrence_result_volume_config.yaml")
#
# Two sections — one per plot method:
#   bar       → plot_prevalence_bar()
#   count_bar → plot_count_distribution_bar()
#
# The canvas is shared across both methods.
# All sections are optional — omit any section to use its defaults.
# Within a section, omit any field to use its default value.


# ── Canvas ────────────────────────────────────────────────────────────────────
# Shared across all plot methods.

canvas:
  figsize:   [10, 5]   # [width, height] in inches. Default: [12, 7]
  dpi:       120       # Output resolution. Default: 120
  font_size: 12        # Base font size for all methods. Default: 12


# ── Bar ───────────────────────────────────────────────────────────────────────
# Controls plot_prevalence_bar() — % with any / multiple / no occurrences.
# Three fixed bars, each with its own color.

bar:

  labels:
    title:    null                        # null → auto-generated from identity
    subtitle: null
    xlabel:   null                        # null → uses identity as x-axis label
    ylabel:   "% of cohort"
    units:    null

  color_any:       "#028090"   # Bar color for entities with any occurrence
  color_multiple:  "#E05C40"   # Bar color for entities with multiple occurrences
  color_none:      "#EEEEEE"   # Bar color for entities with no occurrences
  show_pct_labels: true        # Annotate each bar with percentage and count
  alpha:           0.85
  show_ci:         true        # Draw Wilson confidence interval error bars
  ci_alpha:        0.8         # Ignored if show_ci: false
  ci_color:        "#333333"   # Ignored if show_ci: false


# ── Count bar ─────────────────────────────────────────────────────────────────
# Controls plot_count_distribution_bar() — discrete n=0, n=1, ... n=max_n+ breakdown.
# All bars share one color.

count_bar:

  labels:
    title:    null                        # null → auto-generated from identity
    subtitle: null
    xlabel:   null                        # null → uses identity as x-axis label
    ylabel:   "% of cohort"              # ignored when show_as_pct: false
    units:    null

  max_n:             5        # Overflow cutoff — entities with n >= max_n go into
                              # a single 'n=5+' bar. Must be >= 2. Default: 5
  color:             "#028090"
  show_as_pct:       true     # true → y-axis shows % of cohort (default)
                              # false → y-axis shows raw entity counts
  show_count_labels: true     # Annotate each bar with percentage and count
  alpha:             0.85
  show_ci:           true     # CI only drawn when show_as_pct: true
  ci_alpha:          0.8      # Ignored if show_ci: false
  ci_color:          "#333333"  # Ignored if show_ci: false

  # Percentile lines are snapped to the nearest bar centre.
  # Computed from the raw n column, rounded to the nearest integer.
  # Values >= max_n snap to the overflow bar.
  percentile_lines:
    show:        true
    values:      [25, 50, 75, 90]
    color:       "#333333"
    linestyle:   dashed         # dashed | dotted | solid
    show_labels: true
